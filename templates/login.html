<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form action="/login" method="POST">
    <input type="email" name="email" placeholder="Email" required><br><br>
    <input type="password" name="senha" placeholder="Senha" required><br><br>
    <button type="submit">Entrar</button>
</form>

<br>

<a href="/recuperar">Esqueci minha senha</a>

<br><br>

<!-- Mensagens -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <ul>
      {% for msg in messages %}
        <li>{{ msg }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

<!-- Contador de bloqueio -->
{% if tempo_restante > 0 %}
<p id="contador">Tente novamente em {{ tempo_restante }} segundos</p>

<script>
    var tempo = Number("{{ tempo_restante }}");

    var contador = document.getElementById("contador");

    var intervalo = setInterval(function() {
        tempo--;

        if (tempo <= 0) {
            clearInterval(intervalo);
            contador.innerText = "Você já pode tentar novamente!";
            return;
        }

        contador.innerText = "Tente novamente em " + tempo + " segundos";
    }, 1000);
</script>
{% endif %}

</body>
</html>
